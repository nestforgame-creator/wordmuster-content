name: Validate Challenge Data

on:
  pull_request:
    paths:
      - "data/challenge/**"
      - "scripts/validate/**"
      - "package.json"
      - "package-lock.json"

  push:
    branches: [main, content-improvement-pass-1]
    paths:
      - 'data/challenge/**'
      - 'scripts/validate/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/validate-challenge.yml'

  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate challenge data
        run: node scripts/validate/validate-challenge-data.js

      - name: Validate board words
        run: node scripts/validate/validate-boards-words.js
